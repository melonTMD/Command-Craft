        header li {

        header #branding h1 {

            text-align: center;
        }

            border: 1px solid #ddd;
            border-radius: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card img {
            width: 100px;
            height: 100px;
            border-radius: 0;
            margin-right: 20px;
        }
        .card-content {
            flex-grow: 1;
        }
        .card-title {
            font-size: 20px;
            margin: 0 0 10px 0;

        .card-description {
            font-size: 16px;
            color: #666;
        }
        .card-footer {
            text-align: right;
        }
        .card-footer a {
            text-decoration: none;
